<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Rorizon Platform</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    .brand-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .brand-icon { width: 32px; height: 32px; background: #2563eb; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .brand-icon img { filter: brightness(0) invert(1); width: 20px; }
    .brand-text { font-size: 20px; font-weight: 700; color: #0f172a; }
    
    .auth-card { background: #fff; width: 100%; max-width: 440px; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
    .auth-title { font-size: 24px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
    .auth-subtitle { color: #64748b; font-size: 14px; margin-bottom: 24px; }
    
    .step-indicator { display: flex; align-items: center; justify-content: center; margin-bottom: 32px; }
    .step-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #94a3b8; background: #e2e8f0; border: 2px solid #fff; }
    .step-circle.active { background: #2563eb; color: #fff; }
    .step-circle.done { background: #fff; border-color: #2563eb; color: #2563eb; }
    .step-line { width: 40px; height: 2px; background: #e2e8f0; margin: 0 8px; }
    .step-line.active { background: #2563eb; }
    
    .form-step { display: none; text-align: left; }
    .form-step.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    
    .form-label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: #1e293b; }
    .form-input { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; color: #334155; transition: border-color 0.2s; box-sizing: border-box; margin-bottom: 24px;}
    .form-input:focus { border-color: #2563eb; outline: none; }
    
    .otp-container { display: flex; gap: 12px; justify-content: center; margin-bottom: 12px; }
    .otp-input { width: 48px; height: 56px; font-size: 24px; text-align: center; border: 1px solid #cbd5e1; border-radius: 8px; color: #0f172a; }
    .otp-input:focus { border-color: #2563eb; outline: none; }
    .otp-msg { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 24px; }
    
    .btn-submit { width: 100%; padding: 14px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-submit:hover { background: #1d4ed8; }
    .btn-outline { padding: 14px 24px; background: #fff; color: #64748b; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-outline:hover { background: #f8fafc; }
    
    .action-row { display: flex; gap: 12px; }
    
    .auth-footer { margin-top: 32px; text-align: center; font-size: 14px; }
    .back-login { color: #94a3b8; text-decoration: none; }
    .back-login:hover { color: #64748b; }
  </style>
</head>
<body>

  <div class="brand-header">
    <div class="brand-icon"><img src="../assets/icons/leaf0.svg" alt=""></div>
    <div class="brand-text">Rorizon</div>
  </div>

  <div class="auth-card">
    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-subtitle" id="authDesc">Enter your email to receive an OTP</p>
    
    <div class="step-indicator">
      <div class="step-circle active" id="c1">1</div>
      <div class="step-line" id="l1"></div>
      <div class="step-circle" id="c2">2</div>
      <div class="step-line" id="l2"></div>
      <div class="step-circle" id="c3">3</div>
    </div>
    
    <!-- Step 1 -->
    <div class="form-step active" id="step1">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" id="resetEmail" placeholder="your.email@company.com">
      <button class="btn-submit" id="btnSend">Send OTP</button>
    </div>
    
    <!-- Step 2 -->
    <div class="form-step" id="step2">
      <label class="form-label" style="text-align: center;">Enter 6-Digit OTP</label>
      <div class="otp-container">
        <input type="text" maxlength="1" class="otp-input">
        <input type="text" maxlength="1" class="otp-input">
        <input type="text" maxlength="1" class="otp-input">
        <input type="text" maxlength="1" class="otp-input">
        <input type="text" maxlength="1" class="otp-input">
        <input type="text" maxlength="1" class="otp-input">
      </div>
      <div class="otp-msg">OTP sent to email</div>
      <div class="action-row">
        <button class="btn-outline" id="btnBack1">&larr; Back</button>
        <button class="btn-submit" style="flex:1" id="btnVerify">Verify OTP</button>
      </div>
      <div style="text-align: center; margin-top: 24px;">
        <a href="#" style="color: #64748b; text-decoration: none; font-size: 14px;">Resend OTP</a>
      </div>
    </div>
    
    <!-- Step 3 -->
    <div class="form-step" id="step3">
      <label class="form-label">New Password</label>
      <input type="password" class="form-input" id="newPass1" placeholder="Minimum 8 characters">
      <label class="form-label">Confirm New Password</label>
      <input type="password" class="form-input" id="newPass2" placeholder="Re-enter new password">
      <div class="action-row">
        <button class="btn-outline" id="btnBack2">&larr; Back</button>
        <button class="btn-submit" style="flex:1" id="btnReset">Reset Password</button>
      </div>
    </div>
  </div>
  
  <div class="auth-footer">
    <a href="auth-login.html" class="back-login">&larr; Back to Login</a>
  </div>

  <div class="toast toast--success" id="toastMessage">
    <div class="toast__icon"><img src="../assets/icons/check-circle0.svg" alt="" /></div>
    <p class="toast__text" id="toastText"></p>
  </div>

  <script src="../../js/data.js"></script>
  <script src="../../js/utils.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const sEmail = document.getElementById('step1');
      const sOtp = document.getElementById('step2');
      const sNew = document.getElementById('step3');
      const desc = document.getElementById('authDesc');
      
      const c1 = document.getElementById('c1');
      const c2 = document.getElementById('c2');
      const c3 = document.getElementById('c3');
      const l1 = document.getElementById('l1');
      const l2 = document.getElementById('l2');

      const otpInputs = document.querySelectorAll('.otp-input');
      otpInputs.forEach((input, index) => {
        input.addEventListener('keyup', (e) => {
          if (e.key >= 0 && e.key <= 9 && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
          } else if (e.key === 'Backspace' && index > 0 && !input.value) {
            otpInputs[index - 1].focus();
          }
        });
      });

      document.getElementById('btnSend').addEventListener('click', () => {
        const email = document.getElementById('resetEmail').value;
        if (!Utils.validateEmail(email)) return Utils.showToast('Enter a valid email', 'error');
        
        sEmail.classList.remove('active');
        sOtp.classList.add('active');
        desc.textContent = "Enter the 6-digit code sent to your email";
        
        c1.classList.remove('active'); c1.classList.add('done'); c1.textContent = '✓';
        l1.classList.add('active');
        c2.classList.add('active');
      });

      document.getElementById('btnBack1').addEventListener('click', () => {
        sOtp.classList.remove('active'); sEmail.classList.add('active');
        desc.textContent = "Enter your email to receive an OTP";
        c2.classList.remove('active'); l1.classList.remove('active');
        c1.classList.remove('done'); c1.classList.add('active'); c1.textContent = '1';
      });

      document.getElementById('btnVerify').addEventListener('click', () => {
        const code = Array.from(otpInputs).map(i => i.value).join('');
        if (code.length < 6) return Utils.showToast('Enter full 6-digit code', 'error');
        
        sOtp.classList.remove('active'); sNew.classList.add('active');
        desc.textContent = "Create a new password for your account";
        
        c2.classList.remove('active'); c2.classList.add('done'); c2.textContent = '✓';
        l2.classList.add('active');
        c3.classList.add('active');
      });

      document.getElementById('btnBack2').addEventListener('click', () => {
        sNew.classList.remove('active'); sOtp.classList.add('active');
        desc.textContent = "Enter the 6-digit code sent to your email";
        c3.classList.remove('active'); l2.classList.remove('active');
        c2.classList.remove('done'); c2.classList.add('active'); c2.textContent = '2';
      });

      document.getElementById('btnReset').addEventListener('click', () => {
        const p1 = document.getElementById('newPass1').value;
        const p2 = document.getElementById('newPass2').value;
        if (!p1 || p1 !== p2) return Utils.showToast('Passwords do not match', 'error');
        
        Utils.showToast('Password updated! Redirecting...');
        setTimeout(() => { window.location.href = 'auth-login.html'; }, 1500);
      });
    });
  </script>
</body>
</html>
